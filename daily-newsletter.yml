name: 오늘의 발견 — Daily Newsletter

on:
  schedule:
    # 22:00 UTC == 07:00 KST (next morning in Korea).
    # Change this to shift your delivery time. Format: 'min hour * * *' (UTC).
    # Note: GitHub's scheduler can run a few minutes late under load — that's normal.
    - cron: '0 22 * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Curate and send
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          # Optional overrides:
          # NEWSLETTER_MODEL: claude-opus-4-8
        run: python curate.py

      - name: Upload issue preview (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-issue
          path: last_issue.html
          if-no-files-found: ignore
          retention-days: 14
